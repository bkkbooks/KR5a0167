body:
  text: 枕中書洪歷觀天地之寶藏上聖之宮第至上之尊神仙圖記猶未知極妙之根以去月乙丑夜半靜齋于羅浮山忽驚風駭起香馥亂芳龍鳴虎嘯躑躅空中有頃之間紫雲覆林忽見一真人眼瞳正方項負圓光天顏絕世乘白麟之車建九旌之節腰帶瓊文鳳繡之錦旍頭戴六通之冠年可二十許侍者執夜光之火玉羽衛可有千人自號玄都太真王問曰子是葛洪乎何為而希長存洪稽首披陳長跪執禮神告余曰子是籍九天之嘉慶乘運挺英復千年之後太清有仙伯之名今當遠變去世卜宅西鄉相攜於太華之上丹宮之中且還時朝以龍淵代身密乎寂往莫識今真子窮翫墳典聰秀逸群解滯悟惑可謂妙才矣但未知真仙之宮第上聖之所由耳吾今行矣相告計共事不復為久也洪因伏叩頭於是真人即令侍者執筆擘紙口授妙言既畢左手授與洪云吾往方丈簡仙官致復相過子勖之焉吾去矣見駕乘冉而高乃失所在也真書曰昔二儀未分溟涬鴻濛未有成形天地日月未具狀如雞子混沌立黃已有盤古真人天地之精自號元始天王遊乎其中溟涬經四劫天形如臣蓋上无所係下无所依天地之外遼屬無端玄玄太空無響無聲元氣浩浩如水之形下無山嶽上無列星積氣堅剛大柔服維天地浮其中展轉無方若無此氣天地不生天者如龍旋迴雲中復經四劫二儀始分相去三萬六千里崖石出血成水水生元蟲元蟲生濱牽生剛須剛須生龍元始天王在天中心之上名曰玉京山山中宮殿並金玉飾之常仰吸天氣俯飲地泉復經二劫忽生太元玉女在石澗積血之中出而能言人形具足天姿絕妙當遊厚地之間仰吸天炁號曰太元聖母元始君下遊見之乃與通氣結精招還上宮當此之時二氣絪縕覆載氣息陰陽調和无熱无寒天得一以清地得一以寧並不復呼吸宣氣合會相成自然飽滿大道之興莫過千此結積堅固是以不朽金玉珠者天地之精也服之能與天地相畢元始君經一劫乃一施太元母生天皇十三頭治三萬六千歲書為扶桑大帝東王公號曰元陽父又生九光玄女號曰太真西王母是西漢夫人天皇受號十三頭後生地皇地皇十一頭地皇生人皇九頭各治三萬六千歲聖真出見受道天无為建初混成天任於今所傳三皇天文是此所宜故能召請天上大聖及地下神靈无所不制故天真皇人三天真王駕九龍之輿是也次得八帝大庭氏庖羲神農祝融五龍氏等是其苗胤也今治五嶽是故道隆上代弊極三王三王夏禹殷湯周武也是以淳風既澆易變而禮興禮為亂首也周末陽弱而陰強國多寡婦西戎金兵起而異法興焉既而九州湮沒帝業荒蕪此言驗也後來方有此事道隆之代其人混沌異法之盛人民猾偽也洪曰此事玄遠非凡學所知吾以庸才幸遭上聖目論天地之奧藏暢至妙之源本輒條所誨銘之于素以為絕思矣夫無心分之人慎勿以此元始告之也故置遺跡示乎世之賢耳真記曰玄都玉京七寶山週迴九萬里在大羅之上城上七寶宮宮內七寶臺有上中下三宮如一宮城一面二百四十門方生八行寶林綠葉朱實五色芝英上有萬二千種芝沼中蓮花徑度十丈上宮是盤古真人元始天王太元聖母所治中宮太上真人金闕老君所治下宮九天真皇三天真王所治玉京有八十一萬天路通八十一萬山嶽洞室夫以得道大聖眾並賜其宮第居宅皆七寶宮闕或在名山山嶽群真所居都有八十一萬處古今有言九九八十一是終天路玉京山也上仙受天任者一日三朝玄都太真人也雖有億萬里往還如一步耳世人安知此哉眾仙或有日三朝扶桑公或三朝西王母玉京金闕是太上真人月三朝元始天王太上真人元始之弟子皆如帝王有司徒丞相也金闕老子太上弟子也扶桑大帝元始陽之氣治東方故世間帝王之子應東宮也西漢九光夫人始陰之氣治西方故曰木公金母天地之尊神元氣鍊精生育萬物調和陰陽光明日月莫不由之精神長存命則无終抱一不離故能長久天失陰陽水旱不節人失陰陽神根命竭世人不能保一守三修生反死固其宜矣可後怨耶吾復千年之間當招子登太上金闕朝宴玉京也此電頃未足為久今且可浮遊五嶽採靈芝尋隱仙之友逍遙無為吾言信可望哉扶桑大帝住在碧海之中宅地四面並方三萬里上有太真宮碧玉城萬里多生林木葉似桑又有椹樹長數千丈二十圍兩同根偶生更相依倚名為扶桑宮第象玉京也眾仙无量數玄洲方丈諸群仙未昇天者在此去會稽岸六萬里大清仙伯太上文人所治蓬萊山對東大海之東北岸山週迴五千里溟海中濤浪衝天九氣丈人所治崑崙玄圃金為墉城四方千里城上安金臺五所玉樓十二瓊華之屋紫翠丹房七寶金玉積之連天巨獸萬尋靈香億千西王母九光所治群仙无量也廣成丈人今為鍾山真人九天仙王漢時四皓仙人安期彭祖今並在此輔焉務成子力墨子為岷山真人今玄子玉子為岷山侯太吳氏為青帝治岱宗山顓頊氏為黑帝治太恒山祝融氏為赤帝治衡霍山軒轅氏為黃帝治嵩高山金天氏為白帝治華陰山右五氏為五帝堯治熊耳山舜治積石山禹治蓋竹山湯治立極山青烏治長山及馮修山長右五人為五帝佐相領五帝事五帝一劫遷佐者代焉許由巢父今為九天侍中箕山公夏啟周發受書為田極明公或住羅酆或在洞天三周天者為降陵真人二人並在金華山漢高祖光武並為四明賓友周靈王令為太虛侍郎治波龍山樂子長闔家得仙未昇天任並住方丈之室神洲受太玄生籙五芝為糧也郭景純為都錄司命治虛臺也左元放今為天桂真人監仙侯葛玄受金闕君命為太極左仙公治蓋竹山又在女兒山常駕乘虎騎也許映始為霍林仙人許穆在華陽洞天立宅為真人許玉斧在童初之北位為真人未有掌領鮑靚為地下主者帶潛山真人復五百年當為崑兵侍郎鄭思遠住南霍常乘虎豹白鹿未有職事蔡鬱壘為東方鬼帝治桃丘山張衡楊雲為北方鬼帝治羅酆山杜子仁為南方鬼帝治羅浮山領羗蠻鬼周乞稽康為中央鬼帝治抱犢山趙文和王真人為西方鬼帝治嶓冢山夫地仙遊五嶽朝朝西王母夕憩鍾山嶽雖未昇天此觀樂亦難言也及童初之府易遷之宮唯有此樂也名山之中年年有仙去者世人不見不信神仙可哀嘆也夫學不顧軀命心志清白者吾未見虛往也或修之不勤勤而不除貪慾之樂三業十惡未改猶抱石而赴長津矣吳越及梁益風氣清貞故多仙人是以成都之境丹陽之域會稽之東南天路所衝善宜修尚也凡此眾仙及命過受書者巨眾不可具記在小嶽之中者亦略舉之也鬼谷先生為太玄師治青城山王子喬為金闕侍中治桐柏山赤松為崑林仙伯治南嶽山王子登為小有天王治王屋山孤竹伯夷叔齊等並為九天僕射治天台山孔某為太極上真公治九嶷山顏回受書初為明泉侍郎後為三天司真七十二人受名玄洲門徒三千不經北酆之門項儀山為蓬萊司馬周公旦為北帝師治勁革山莊周為太玄博士治在荊山孫權受任治亦在荊山張道陵為三天法師統御六虛數侍金闕太上之股肱治在廬山三師同宅王方平今為上相治月支國人鳥山墨翟為太極仙卿治馬跡山徐來勒為太極真治括蒼山小宮在天台山陳世安治小台山嚴君平今治在峨嵋山屈原為海伯統領八海王弼為北海監郭聲子為閬風真人魏夫人治南嶽山裴清靈治四明山馬明生今在鍾山陰長生為地肺真人孫登閭邱真人九華真妃治夏蓋山或在龍山王長趙昇受書為廬山中正一三天都護韓眾今為霍林真人瑯琊為太虛左掾侍史三茅為保命定錄司非監在華陽洞府治北居棲憩包山有數千小山亦不減百皆是神山今略證仙人之數足以令子心堅仰慕矣祕之勿宣若高賢心馳嶺外子去世之際可緘以示之苟行業不建德務不仁者終天无令見也凡青嶂之裏千嶺之際仙人无量與世人比肩而不知凡人有因緣者或在深山迷誤入仙家使為仙洞玉女所留請先功厚也初學道不必入山閉門勤修不雜人物長齋執志或清香灑掃亦能降真矣魏夫人許氏之徒皆其流也要當捃拾方術真書良久傳影響粗應便當絕逆耳若出入人間蹔拾山谷事緣衣服飲食不須與世交當有異矣外和光同塵內守其真一斯言之妙也
