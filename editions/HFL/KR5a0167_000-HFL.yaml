front:
  text: 元始上眞衆仙記騰三
  hash: sha256:01cf6508a03a98d75b522f69369841cbcb945d6d103e35625aef7e7991dc37eb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0167_HFL_000-001a, image: hfl/0073/0073-046.png}
body:
  text: 葛洪枕中書洪歴觀天地之寳藏上聖之宫第至上之尊神仙圖記猶未知極妙之根以去月己丑夜半靜齋於羅浮山忽驚風駭起香馥亂芳龍鳴虎嘯躑躅空中有頃之間紫雲覆林忽見一眞人眼瞳正方項負圓光天顔絶世乗白麟之車建九旄之節腰帶瓊文鳳繍之錦旍頭戴六通之冠年可二十許侍者執夜光之火玉羽衞可有千人自號玄都太眞王問曰子是葛洪乎何爲而希長存洪稽首披陳長跪執禮神告余曰子是籍九天之嘉慶乗運挺英復千年之後太清有仙伯之名今當遠變去世卜宅西郷相擕於太華之上丹宮之中且還時朝以龍淵代身宻乎寂往莫識今眞子窮翫墳與聦秀逸羣解滯悟惑可謂妙才矣但未知眞仙之宫第上聖之所由耳吾今行矣相吿計共事不復爲久也洪因伏叩頭於是眞神即令侍者執筆擘紙口授妙言既畢左手授與洪云吾往方丈簡仙官致復相過子勗之焉吾去矣見駕乗冉冉而髙乃失所在也眞書曰昔二儀未分溟津鴻濛未有成形天地日月未具狀如雞子混沌玄黄巳有盤古眞人天地之精自號元始天王遊乎其中溟涬經四劫天形如巨蓋上無所係下無所根天地之外遼屬無端玄玄太空無響無聲元氣浩治如水之形下無山嶽上無列星積氣堅剛大柔服結天地浮其中展轉無方若無此氣天地不生天者如龍旋迴雲中復經四劫二儀始分相去三萬六千里崖石出血成水水生元蟲元蟲生濵牽濵牽生剛須剛須生龍元始天王在天中心之上名曰玉京山山中宫殿並金玉飾之常仰吸天氣俯飮地泉復經二劫忽生太元玉女在石澗積血之中出而能言人形具足天姿絶妙常遊厚地之間仰吸天元號曰太元聖母元始君下遊見之乃與通氣結精招還上宮當此之時二氣絪緼覆載氣息隂陽調和無熱無寒天得一以清地得一以寧並不復呼吸宣氣合㑹相成自然飽滿大道之興莫過於此結積竪固是以不朽金玉珠者天地之精也服之與天地相畢元始君經一劫乃一施太元母生天皇十三頭治三萬六千歳書爲扶桑大帝東王公號曰元陽父又生九光玄女號曰太眞西王母是西漢夫人天皇受號十三頭後生地皇地皇十一頭地皇生人皇九頭各治三萬六千嵗聖眞出見受道天文無爲建初混成天任於今所傅三皇天文是此所宣故能召請天上大聖及地下神靈無所不制故天眞皇人三天眞王駕九龍之輿是也次得八帝大庭氏庖羲神農祝融五龍氏等是其苗胤也今治五嶽是故道隆上代弊極三王三王夏禹殷湯周武也是以淳風既澆易變而禮興禮爲亂首也周末陽弱而隂強國多寡婦西戎金兵起而異法興焉既而九州湮没帝業荒蕪此言驗也後來方有此事道隆之代其人混沌異法之盛人民猾僞也洪曰此事玄逺非凡學所知吾以庸才幸遭上聖眄目論天地之奥藏暢至妙之源本輒條所誨銘之于素以爲絶思矣夫無心分之人愼勿以此元始告之也故置遺跡示乎世之賢耳眞記曰玄都玉京七寳山週迴九萬里在大羅之上城上七寳宫宫内七寳臺有上中下三宮如一宫城一面二百四十門四方生八行寳林緑葉朱實五色芝英上有萬二千種芝沼中蓮花徑度十丈上宫是盤古眞人元始天王太元聖母所治中宫太上眞人金闕老君所治下宫九天眞皇三天眞王所治玉京有八十一萬天路通八十一萬山嶽洞室夫以得道大聖衆並賜其宫第居宅皆七寳宫闕或在五嶽或在名山山嶽羣眞所居都有八十一萬處古今有言九九八十一是终天路玉京山也上仙受天任者一日三朝玄都太上眞人也雖有億萬里往還如一歩耳世人安知此哉衆仙或有日三朝扶桑公或三朝西王母玉京金闕是太上眞人月三朝元始天王太上眞人元始之第子皆如帝王有司徒丞相也金闕老子太上弟子也扶桑大帝元始陽之氣治東方故世間帝王之子應束宮也西漢九光夫人始隂之氣治西市故曰木公金母天地之尊神元氣鍊精生育萬物調和隂陽光明日月莫不由之精神長存命則無终抱一不離故能長久天失隂陽水旱不節人失隂陽神根命竭世人不能保一守三修生反死固其冝矣可後怨耶吾復千年之間當招子登太上金闕朝宴玉京也此電頃未足爲久今且可浮遊五嶽採靈芝尋隱仙之友逍遙無爲吾言信可望哉扶桑大帝住在碧海之中宅地四面並方三萬里上有太眞宮碧玉城萬里多生林木葉似桑又有椹樹長數千丈二十圍兩兩同根偶生更相依倚名爲扶桑宮第象玉京也衆仙無量數玄洲方丈諸羣仙未昇天者在此去㑹稽岸六萬里太清仙伯太上丈人所治蓬萊山對東大海之東北岸山週迴五千里溟海中濤浪衝天九氣丈人所治崑崙玄圃金爲墉城四方千里城上安金臺五所玉樓十二瓊華之屋紫翠丹房七寳金玉積之連天臣獸萬尋靈香億千西王母九光所治羣仙無量也廣成丈人今爲鍾山眞人九天仙王漢時四皓仙人安期彭祖今並在此輔焉務成子力墨子爲岷山眞人今玄子玉子爲岷山侯太昊氏爲青帝治岱宗山顓頊氏爲黒帝治太恒山祝融氏爲赤帝治衡霍山軒轅氏爲黃帝治嵩髙山金天氏爲白帝治華隂山右五氏爲五帝堯治熊耳山舜治積石山禹治蓋竹山湯治玄極山青鳥治長山及馮修山長右五人爲五帝佐相領五帝事五帝一劫遷佐者代焉許由巢父今爲九天侍中箕山公夏啓周發受書爲四極明公或住羅鄷或在洞天三周大者爲降陵眞人二人並在金華山漠髙祖光武並爲四明賔友周靈王今爲太虚侍郎治波龍山樂子長闔家得仙未昇天任並住方丈之室神洲受太玄生籙五芝爲粮也郭景純爲都録司命治虚臺也左元放今爲天柱眞人監仙侯葛玄受金闕君命爲太極左仙公治蓋竹山又在女几山常駕乗虎騎也許映始爲霍林仙人許穆在華陽洞天立宅爲眞人許玉斧在童初之北位爲眞人未有掌領鮑靚爲地下主者帶潜山眞人復五百年當爲崑兵侍郎鄭思遠住南霍常乗虎豹白鹿未有職事蔡鬰壘爲東方鬼帝治挑丘山張衡楊雲爲北方鬼帝治羅鄷山杜子仁爲南方鬼帝治羅浮山領羌蠻鬼周乞嵇康爲中央鬼帝治抱犢山趙文和王眞人爲西方鬼帝治嶓冡山夫地仙遊五嶽朝朝西王母夕憩鍾山嶽雖未昇天此歡樂亦難言也及童初之府易遷之宫唯有此樂也名山之中年年有仙去者世人不見不信神仙可哀歎也夫學不顧軀命心志清白者吾未見虛往也或修之不勤勤而不除貪慾之樂三業十惡未改猶抱石而赴長津矣吳越及梁益風氣清貞故多仙人是以成都之境丹陽之域㑹稽之東南天路所衝善冝修尚也凡此衆仙及命過受書者巨衆不可具記在小嶽之中者亦略舉之也鬼谷先生爲太玄師治青城山王子喬爲金闕侍中治桐栢山赤松爲崑林仙伯治南嶽山王子登爲小有天王治王屋山孤竹伯夷叔齊等並爲九天僕射治天台山孔丘爲大極上眞公治九嶷山顔回受書初爲明泉侍郎後爲二天司眞七十二人受名玄洲門徒三千不經北鄷之門項儀山爲蓬萊司馬周公旦爲北帝師治勁革山莊周爲太玄博士治在荆山孫權受任治亦在荊山張道陵爲三天法師統御六虚數侍金闕太上之股肱治在廬山三師同宅王方平今爲上相治月支國人鳥山墨翟爲太極仙卿治馬跡山徐來勒爲太極眞人治括蒼山小宫在天台山陳安世治小台山嚴君平今治在峨嵋山屈原爲海伯統領八海王弼爲北海監郭聲子爲閬風眞人魏夫人治南嶽山裴清靈治四明山馬明生今在鍾山隂長生爲地肺眞人孫登爲閭丘眞人九華眞妃治夏蓋山或在龍山王長趙昇二人受書爲廬山中正一三天都護韓衆今爲霍林眞人琅琊于吉爲太虛左掾侍史三茅爲保命定録司非監在華陽洞府治北居棲憩包山有數千小山亦不減百皆是神山今略證仙人之數足以今子心竪仰慕矣祕之勿宣若髙賢心馳嶺外子去世之際可緘以示之苟行業不建德務不仁者終天無今見也凡青嶂之裏千嶺之際仙人無量與世人比肩而不知凡人有因縁者或在深山迷誤入仙家使爲仙洞玉女所留請先功厚也初學道不必入山閉門勤修不雜人物長齋執志或清香灑掃亦能降眞矣魏夫人許氏之徒皆其流也要當捃拾方術眞書良久傳影響粗應便當絶迹耳若出入人間蹩捨山谷事縁衣服飮食不須與世交當有異矣外和光同塵内守其眞一斯言之妙也元始上眞衆仙記
